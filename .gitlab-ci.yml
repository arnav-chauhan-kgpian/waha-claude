# Builds the backend image with Kaniko and pushes it to GitLab Container Registry.
# Works on shared runners — no privileged Docker-in-Docker required.
# Resulting image: $CI_REGISTRY_IMAGE:<tag>   (e.g. registry.gitlab.com/<group>/<repo>:main)

stages:
  - build

variables:
  KANIKO_CACHE_REPO: $CI_REGISTRY_IMAGE/cache

build:image:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:v1.23.2-debug
    entrypoint: [""]
  script:
    - mkdir -p /kaniko/.docker
    - echo "{\"auths\":{\"$CI_REGISTRY\":{\"username\":\"$CI_REGISTRY_USER\",\"password\":\"$CI_REGISTRY_PASSWORD\"}}}" > /kaniko/.docker/config.json
    - |
      DESTINATIONS="--destination $CI_REGISTRY_IMAGE:$CI_COMMIT_REF_SLUG --destination $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA"
      if [ -n "$CI_COMMIT_TAG" ]; then
        DESTINATIONS="$DESTINATIONS --destination $CI_REGISTRY_IMAGE:$CI_COMMIT_TAG"
      fi
      if [ "$CI_COMMIT_BRANCH" = "$CI_DEFAULT_BRANCH" ]; then
        DESTINATIONS="$DESTINATIONS --destination $CI_REGISTRY_IMAGE:latest"
      fi
      /kaniko/executor \
        --context "$CI_PROJECT_DIR" \
        --dockerfile "$CI_PROJECT_DIR/Dockerfile" \
        $DESTINATIONS \
        --cache=true \
        --cache-repo "$KANIKO_CACHE_REPO"
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
