apiVersion: v1
kind: ConfigMap
metadata:
  name: waha-claude-config
  namespace: waha-claude
data:
  # Public URL where Claude (web or skill) reaches this backend.
  PUBLIC_BASE_URL: "https://wa.example.com"
  # In-cluster URL for WAHA Plus. Adjust namespace/service name to match your deploy.
  WAHA_URL: "http://waha.waha.svc.cluster.local:3000"
  PORT: "8080"
  DATA_DIR: "/app/data"
  SEND_MAX_PER_WINDOW: "30"
  SEND_WINDOW_SECONDS: "60"
  LOG_LEVEL: "info"
