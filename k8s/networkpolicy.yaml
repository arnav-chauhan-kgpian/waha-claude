# Allow this backend to reach WAHA (in the `waha` namespace) and the public
# internet (for cert-manager challenges, etc.), and accept ingress only from
# the ingress controller. Adjust namespace/labels to match your cluster.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: waha-claude
  namespace: waha-claude
spec:
  podSelector:
    matchLabels:
      app: waha-claude
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8080
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: waha
      ports:
        - protocol: TCP
          port: 3000
    # DNS
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
