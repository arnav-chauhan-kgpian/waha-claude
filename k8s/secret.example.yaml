# Template for the runtime secret. Copy to `k8s/secret.yaml`, populate, and
# apply directly with `kubectl apply -f k8s/secret.yaml`. The populated file
# should NOT be committed — it's gitignored.
#
# Quick path without a YAML file (preferred if you can):
#   kubectl -n waha-claude-prod create secret generic waha-claude-secrets \
#     --from-literal=WAHA_API_KEY='<strong random string>' \
#     --from-literal=INVITE_CODE='<strong random string>'
#
# WAHA_API_KEY is shared: the WAHA pod (waha.yaml) reads the SAME value as its
# WHATSAPP_API_KEY env via secretKeyRef, and the waha-claude backend sends it as
# the X-Api-Key header on every WAHA call. One source of truth.
#
# INVITE_CODE gates `POST /signup`. Without it set, anyone with the public URL
# can mint themselves an account. Keep it set in production.
apiVersion: v1
kind: Secret
metadata:
  name: waha-claude-secrets
  namespace: waha-claude-prod
type: Opaque
stringData:
  WAHA_API_KEY: ""
  INVITE_CODE: ""
