# Do NOT commit a populated copy of this file.
# Recommended: create the Secret with `kubectl create secret generic ...`
# or use SealedSecrets / ExternalSecrets and reference the real values from
# your secret manager.
#
# Quick path:
#   kubectl -n waha-claude create secret generic waha-claude-secrets \
#     --from-literal=WAHA_API_KEY='<same-key-as-WAHA-pod>' \
#     --from-literal=INVITE_CODE='<random-invite-code-or-omit>'
#
apiVersion: v1
kind: Secret
metadata:
  name: waha-claude-secrets
  namespace: waha-claude
type: Opaque
stringData:
  WAHA_API_KEY: "replace-me"
  # Omit INVITE_CODE to leave signup open. Keep it set in production.
  INVITE_CODE: "replace-me-or-delete-this-line"
